<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Dweller's Project — TotK Companion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --sheikah-blue: #00d4ff;
  --sheikah-glow: #00d4ff30;
  --zonai-green: #7cfc00;
  --depths-purple: #8b5cf6;
  --hyrule-gold: #f5c842;
  --attack-red: #ef4444;
  --defense-blue: #3b82f6;
  --dark-bg: #080c16;
  --panel-bg: #0f1520;
  --card-bg: #151d2e;
  --card-border: #1e293b;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--dark-bg);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 900px;
  margin: 0 auto;
}

.header {
  padding: 20px 24px 12px;
  text-align: center;
  flex-shrink: 0;
}

.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--sheikah-blue);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.header .subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 1px;
}

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 0;
  scroll-behavior: smooth;
}

.chat-area::-webkit-scrollbar { width: 5px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

.msg { max-width: 100%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.user { align-self: flex-end; max-width: 75%; }
.msg.user .bubble {
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.25);
  border-radius: 16px 16px 4px 16px;
  padding: 12px 18px;
  font-size: 14px;
  line-height: 1.5;
}

.msg.companion .bubble {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
}

.msg.companion .bubble strong { color: var(--text-primary); }
.msg.companion .bubble .hl { color: var(--hyrule-gold); font-weight: 600; }

.cards-row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 8px 0;
  margin-top: 12px;
}
.cards-row::-webkit-scrollbar { height: 4px; }
.cards-row::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }

.item-card {
  min-width: 200px;
  max-width: 240px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.2s;
}
.item-card:hover {
  border-color: var(--sheikah-blue);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0, 212, 255, 0.1);
}

.card-img {
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  position: relative;
}
.card-img .bg-glow {
  position: absolute;
  width: 80px; height: 80px;
  border-radius: 50%;
  filter: blur(35px);
  opacity: 0.3;
}
.card-img.weapon .bg-glow { background: var(--attack-red); }
.card-img.armor .bg-glow { background: var(--defense-blue); }
.card-img.material .bg-glow { background: var(--zonai-green); }
.card-img.zonai .bg-glow { background: var(--depths-purple); }

.card-body { padding: 10px 14px 14px; }
.card-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-type { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.card-stats { display: flex; gap: 10px; align-items: center; }
.card-stat { display: flex; align-items: center; gap: 3px; font-size: 12px; }
.card-stat .val { font-weight: 700; font-size: 14px; }
.card-stat.atk .val { color: var(--attack-red); }
.card-stat.def .val { color: var(--defense-blue); }
.card-rarity {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-left: auto;
}
.card-rarity.legendary { background: rgba(245,200,66,0.15); color: var(--hyrule-gold); }
.card-rarity.rare { background: rgba(139,92,246,0.15); color: var(--depths-purple); }
.card-rarity.uncommon { background: rgba(0,212,255,0.15); color: var(--sheikah-blue); }
.card-rarity.common { background: rgba(100,116,139,0.15); color: var(--text-muted); }

/* Detail panel */
.detail-panel { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; padding:20px; }
.detail-panel.open { display:flex; }
.detail-content { background:var(--panel-bg); border:1px solid var(--card-border); border-radius:16px; width:100%; max-width:560px; max-height:80vh; overflow-y:auto; animation:slideUp 0.25s ease; }
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

.detail-top { display:flex; align-items:center; gap:16px; padding:24px 24px 16px; border-bottom:1px solid var(--card-border); }
.detail-emoji { font-size:48px; }
.detail-info h2 { font-family:'Cinzel',serif; font-size:20px; color:var(--sheikah-blue); }
.detail-info .detail-sub { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.detail-close { margin-left:auto; width:36px; height:36px; border-radius:8px; background:var(--dark-bg); border:1px solid var(--card-border); color:var(--text-muted); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.detail-close:hover { color:var(--text-primary); border-color:var(--sheikah-blue); }

.detail-stats-row { display:flex; gap:12px; padding:16px 24px; }
.detail-stat-box { flex:1; background:var(--dark-bg); border-radius:10px; padding:14px; text-align:center; }
.detail-stat-box .val { font-family:'Cinzel',serif; font-size:28px; font-weight:700; }
.detail-stat-box .val.atk { color:var(--attack-red); }
.detail-stat-box .val.def { color:var(--defense-blue); }
.detail-stat-box .val.gold { color:var(--hyrule-gold); }
.detail-stat-box .lbl { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

.detail-section { padding:0 24px 20px; }
.detail-section h4 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:8px; }
.detail-section p { font-size:14px; line-height:1.7; color:var(--text-secondary); }
.detail-location { display:flex; align-items:flex-start; gap:10px; background:var(--dark-bg); border-radius:10px; padding:14px 16px; margin-top:8px; }
.detail-location .pin { font-size:20px; flex-shrink:0; }
.detail-location .loc-text { font-size:13px; line-height:1.5; color:var(--text-primary); }
.detail-fuse { background:rgba(245,200,66,0.08); border:1px solid rgba(245,200,66,0.15); border-radius:10px; padding:14px 16px; margin-top:8px; font-size:13px; line-height:1.5; color:var(--hyrule-gold); }

.quick-actions { padding:8px 24px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; flex-shrink:0; }
.quick-btn { padding:8px 16px; border-radius:20px; font-size:12px; font-weight:500; background:var(--card-bg); border:1px solid var(--card-border); color:var(--text-secondary); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.quick-btn:hover { border-color:var(--sheikah-blue); color:var(--sheikah-blue); }

.input-area { padding:12px 24px 20px; flex-shrink:0; }
.input-row { display:flex; gap:10px; align-items:center; }
.input-field { flex:1; padding:14px 20px; background:var(--panel-bg); border:1px solid var(--card-border); border-radius:28px; color:var(--text-primary); font-size:14px; outline:none; transition:border-color 0.2s; }
.input-field:focus { border-color:var(--sheikah-blue); box-shadow:0 0 0 3px var(--sheikah-glow); }
.input-field::placeholder { color:var(--text-muted); }
.send-btn { width:48px; height:48px; border-radius:50%; background:var(--sheikah-blue); border:none; color:var(--dark-bg); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
.send-btn:hover { background:#33ddff; transform:scale(1.05); }

.typing { display:inline-flex; gap:4px; padding:4px 0; }
.typing span { width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:blink 1.4s infinite; }
.typing span:nth-child(2){animation-delay:0.2s;} .typing span:nth-child(3){animation-delay:0.4s;}
@keyframes blink { 0%,60%,100%{opacity:0.3;transform:translateY(0);} 30%{opacity:1;transform:translateY(-3px);} }

@media(max-width:640px){.app{max-width:100%;}.chat-area{padding:12px 16px;}.input-area{padding:10px 16px 16px;}.item-card{min-width:170px;}}
</style>
</head>

const ALL=[...DB.weapons,...DB.armor,...DB.materials,...DB.builds];
function itemType(item){if(DB.weapons.includes(item))return'weapon';if(DB.armor.includes(item))return'armor';if(DB.materials.includes(item))return'material';return'zonai';}

function renderCard(item){const t=itemType(item);const a=item.atk?`<div class="card-stat atk"><span class="val">${item.atk}</span> ATK</div>`:'';const d=item.def?`<div class="card-stat def"><span class="val">${item.def}</span> DEF</div>`:'';const f=item.fuseDmg?`<div class="card-stat atk"><span class="val">+${item.fuseDmg}</span> FUSE</div>`:'';return`<div class="item-card" onclick="showDetail('${item.id}')"><div class="card-img ${t}"><div class="bg-glow"></div><span>${item.emoji||'📦'}</span></div><div class="card-body"><div class="card-name">${item.name}</div><div class="card-type">${item.sub}</div><div class="card-stats">${a}${d}${f}<span class="card-rarity ${item.rarity}">${item.rarity}</span></div></div></div>`;}
function renderCards(items){if(!items.length)return'';return`<div class="cards-row">${items.map(renderCard).join('')}</div>`;}

function showDetail(id){const item=ALL.find(i=>i.id===id);if(!item)return;let s='';if(item.atk)s+=`<div class="detail-stat-box"><div class="val atk">${item.atk}</div><div class="lbl">Attack</div></div>`;if(item.def)s+=`<div class="detail-stat-box"><div class="val def">${item.def}</div><div class="lbl">Defense</div></div>`;if(item.fuseDmg)s+=`<div class="detail-stat-box"><div class="val atk">+${item.fuseDmg}</div><div class="lbl">Fuse Bonus</div></div>`;if(item.bonus)s+=`<div class="detail-stat-box"><div class="val gold" style="font-size:14px">${item.bonus}</div><div class="lbl">Set Bonus</div></div>`;let p=item.pieces?`<div class="detail-section"><h4>Pieces</h4><p>${item.pieces.join(' · ')}</p></div>`:'';let fu=item.fuse?`<div class="detail-section"><h4>Best Fusion</h4><div class="detail-fuse">💡 ${item.fuse}</div></div>`:'';let co=item.components?`<div class="detail-section"><h4>Components</h4><p>${item.components}</p></div>`:'';document.getElementById('detail-content').innerHTML=`<div class="detail-top"><div class="detail-emoji">${item.emoji||'📦'}</div><div class="detail-info"><h2>${item.name}</h2><div class="detail-sub">${item.sub}</div></div><button class="detail-close" onclick="closeDetail()">✕</button></div>${s?`<div class="detail-stats-row">${s}</div>`:''}<div class="detail-section"><h4>Description</h4><p>${item.desc}</p></div><div class="detail-section"><h4>Where to Find</h4><div class="detail-location"><span class="pin">📍</span><div class="loc-text">${item.loc}</div></div></div>${fu}${p}${co}`;document.getElementById('detail-panel').classList.add('open');}
function closeDetail(){document.getElementById('detail-panel').classList.remove('open');}
document.getElementById('detail-panel').addEventListener('click',e=>{if(e.target.id==='detail-panel')closeDetail();});

function match(t,kw){return kw.some(k=>t.includes(k));}
function findItems(names){return names.map(n=>ALL.find(i=>i.name.toLowerCase()===n.toLowerCase())).filter(Boolean);}

function findResponse(q){const ql=q.toLowerCase();
if(match(ql,['lynel','beat','fight','kill'])){return{text:`Lynels are the toughest enemies in Hyrule. For melee, use <strong>Flurry Rush</strong> — dodge at the last moment. Wear the <span class="hl">Barbarian Set</span> or <span class="hl">Fierce Deity Set</span> for attack boosts, with a weapon fused with a strong horn (+30 or higher). For ranged, headshot to stun, then mount the Lynel and attack from its back — this doesn't consume weapon durability. Bring <span class="hl">Hearty Durian</span> meals for full recovery. After defeating them, they drop the best horns and bows in the game.`,cards:findItems(['barbarian set','savage lynel bow','master sword','silver lynel saber horn','fierce deity set'])};}
if(match(ql,['strongest','best weapon','most powerful','highest damage'])){return{text:`The <span class="hl">Royal Guard's Claymore</span> fused with a <span class="hl">Silver Lynel Saber Horn</span> reaches 87 attack — and its Breaking Point doubles that to roughly <span class="hl">160 damage per hit</span> when nearly broken. For one-handed, the <span class="hl">Scimitar of the Seven</span> doubles fusion power, reaching 138. The <span class="hl">Gloom Club</span> has highest raw base at 50. And the <span class="hl">Master Sword</span> never breaks, making it the best sustained weapon.`,cards:findItems(["royal guard's claymore",'scimitar of the seven','master sword','gloom club'])};}
if(match(ql,['early game','beginning','start','first'])){return{text:`Grab every <span class="hl">Soldier's Broadsword</span> you find and fuse with Bokoblin Horns. Buy the <span class="hl">Hylian Set</span> at Lookout Landing for 210 rupees total. Collect <span class="hl">Bomb Flowers</span> and <span class="hl">Puffshrooms</span> from caves — they're game-changers. Don't hoard weapons, fuse everything. Visit the Great Sky Island shrines first for Ultrahand, Fuse, and Ascend.`,cards:findItems(["soldier's broadsword",'hylian set','bomb flower','puffshroom'])};}
if(match(ql,['depths','underground','deep','gloom'])){return{text:`Wear the <span class="hl">Depths Set</span> (buy with Poes at Bargainer Statues) for Gloom resistance. Without it, max hearts shrink permanently until surface. Throw Brightbloom Seeds constantly. <span class="hl">Gloom weapons</span> (41-50 attack) are powerful but risky. Farm <span class="hl">Zonaite</span> while underground. Save <span class="hl">Ancient Blades</span> for emergencies — they one-shot any non-boss.`,cards:findItems(['depths set','dark set','gloom sword','gloom club','zonaite','ancient blade'])};}
if(match(ql,['air bike','fly','vehicle','build'])){return{text:`The <span class="hl">Air Bike</span> is the best vehicle. 2 Fans at 45° + Steering Stick between them. Fast, efficient, stable. Save to <strong>Autobuild</strong> immediately. The <span class="hl">Flying Platform</span> for slow vertical ascent, <span class="hl">Rocket Sled</span> for insane speed, <span class="hl">Battle Wagon</span> for rolling into camps with beam weapons.`,cards:findItems(['air bike','flying platform','rocket sled','battle wagon'])};}
if(match(ql,['diamond','gem','rupee','money'])){return{text:`<span class="hl">Diamonds</span> drop from Stone Taluses (especially Rare variants), from black ore deposits in caves (Eldin and Gerudo), and Goron City merchant for 1000 rupees. You need them for legendary weapons: 4 for Scimitar, 3 each for Trident and Boulder Breaker. For rupees, sell gems: Diamonds (500), Sapphires (150), Rubies (110). Farm Stone Taluses after Blood Moon.`,cards:findItems(['diamond','ruby','sapphire','topaz'])};}
if(match(ql,['armor','best armor','combat armor','defence','defense'])){return{text:`For combat: <span class="hl">Barbarian Set</span> or <span class="hl">Fierce Deity Set</span> — Attack Up + Charge Stamina Up. For Depths: <span class="hl">Depths Set</span> is essential. For Sky Islands: <span class="hl">Glide Set</span> with zero fall damage. Endgame: <span class="hl">Ancient Hero's Aspect</span> from all 152 shrines — highest defense in the game.`,cards:findItems(['barbarian set','fierce deity set','depths set','glide set',"ancient hero's aspect"])};}
if(match(ql,['fusion','fuse','attach','combine'])){return{text:`Strongest fuse material: <span class="hl">Silver Lynel Saber Horn</span> at +55. Tactical: <span class="hl">Muddle Buds</span> make enemies fight each other, <span class="hl">Bomb Flowers</span> create explosive arrows, gems add elements. Key: some weapons <em>multiply</em> fusion power — Scimitar of the Seven and Gerudo Scimitar both double it. <span class="hl">Dragon Horn Shards</span> add +20 each with elements.`,cards:findItems(['silver lynel saber horn','muddle bud','bomb flower','light dragon horn shard'])};}
if(match(ql,['cook','food','recipe','heal','hearts','stamina'])){return{text:`<span class="hl">Hearty Durian</span> (Faron region) cooked alone: full recovery + bonus hearts. <span class="hl">Endura Carrot</span> (near Great Fairy Fountains) cooked alone: full stamina recovery + bonus. Cook single high-value ingredients, not mixtures. Cook during Blood Moon for critical success. Five Hearty Durians = full recovery + 20 bonus hearts.`,cards:findItems(['hearty durian','endura carrot'])};}
if(match(ql,['dragon','dinraal','naydra','farosh','light dragon'])){return{text:`Four dragons on set paths. <span class="hl">Light Dragon</span> circles all Hyrule at high altitude. <span class="hl">Dinraal</span> (fire) through Eldin/Akkala. <span class="hl">Naydra</span> (ice) through Lanayru. <span class="hl">Farosh</span> (electric) through Faron/Lake Hylia. Land on their back, climb to horn, strike. Each horn gives +20 fuse attack + element, and cooks into 30-minute resistance buff.`,cards:findItems(['light dragon horn shard','dinraal horn shard','naydra horn shard','farosh horn shard'])};}
if(match(ql,['shrine','152','blessing'])){return{text:`<span class="hl">152 shrines</span> total: 120 surface, 32 sky. Each gives one Light of Blessing — trade 4 at Goddess Statues for a heart or stamina upgrade. Types: puzzle, combat, Proving Grounds (lose equipment), Rauru's Blessing (challenge is finding it). Complete all 152 for the <span class="hl">Ancient Hero's Aspect</span>. Use Shrine Sensor from Hateno Research Lab.`,cards:findItems(["ancient hero's aspect"])};}
if(match(ql,['zonai','device','battery','energy'])){return{text:`Get Zonai Devices from dispensers on Sky Islands and in Depths. <span class="hl">Zonaite Set</span> doubles battery recharge — essential for builders. Farm <span class="hl">Zonaite</span> in the Depths. Key devices: Fans (flight), Wheels (ground), Rockets (speed), Beam Emitters (combat), Springs (launch). Learn the <span class="hl">Air Bike</span> first.`,cards:findItems(['zonaite set','air bike','zonaite','large zonaite'])};}
const nameMatch=ALL.filter(i=>i.name.toLowerCase().includes(ql)||ql.includes(i.name.toLowerCase()));
if(nameMatch.length>0){const item=nameMatch[0];let t=`<span class="hl">${item.name}</span> — ${item.desc}`;if(item.fuse)t+=`<br><br><strong>Best Fusion:</strong> ${item.fuse}`;if(item.components)t+=`<br><br><strong>Components:</strong> ${item.components}`;if(item.bonus)t+=`<br><br><strong>Set Bonus:</strong> ${item.bonus}`;if(item.pieces)t+=`<br><br><strong>Pieces:</strong> ${item.pieces.join(' · ')}`;return{text:t,cards:nameMatch.slice(0,5)};}
const results=ALL.filter(i=>{const h=`${i.name} ${i.sub} ${i.desc} ${i.loc||''} ${i.bonus||''} ${i.fuse||''}`.toLowerCase();return ql.split(/\s+/).some(w=>w.length>2&&h.includes(w));});
if(results.length>0)return{text:`Here's what I found:`,cards:results.slice(0,6)};
return{text:`I don't have that yet — the knowledge base is growing. Try asking about weapons, armor, materials, builds, cooking, dragons, shrines, or combat tips like "How do I beat a Lynel?"`,cards:[]};}

const chat=document.getElementById('chat');
function addMsg(html,isUser=false){const d=document.createElement('div');d.className=`msg ${isUser?'user':'companion'}`;d.innerHTML=`<div class="bubble">${html}</div>`;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;}
function addCompanionMsg(text,cards=[]){const d=document.createElement('div');d.className='msg companion';d.innerHTML=`<div class="bubble">${text}${renderCards(cards)}</div>`;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}
function send(text){if(!text.trim())return;addMsg(text,true);document.getElementById('input').value='';const t=addMsg('<div class="typing"><span></span><span></span><span></span></div>');t.id='typing';setTimeout(()=>{document.getElementById('typing')?.remove();const r=findResponse(text);addCompanionMsg(r.text,r.cards);},500+Math.random()*500);}

document.getElementById('send').addEventListener('click',()=>send(document.getElementById('input').value));
document.getElementById('input').addEventListener('keypress',e=>{if(e.key==='Enter')send(e.target.value);});
document.getElementById('quick-actions').addEventListener('click',e=>{if(e.target.classList.contains('quick-btn'))send(e.target.dataset.q);});
addCompanionMsg(`Welcome to <span class="hl">Forest Dweller's Project</span>. I know everything about Tears of the Kingdom — every weapon, every armor set, every material, every build. Ask me anything, or tap a button below.`,[]);
</script>
