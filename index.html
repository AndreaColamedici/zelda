<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Dweller's Project — TotK Companion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --sh:#00d4ff;--sh-dim:#0088aa;--sh-gl:rgba(0,212,255,0.25);
  --zonai:#7cfc00;--depths:#a78bfa;--gold:#f5c842;
  --red:#ff6b6b;--blue:#60a5fa;
  --bg:#030810;--panel:#070e1c;--card:#0b1528;--border:#142040;
  --t1:#e8ecf4;--t2:#94a3b8;--t3:#4a6080;
}
*{margin:0;padding:0;box-sizing:border-box;}

/* ── BOOT ── */
#boot{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s;}
#boot.done{opacity:0;visibility:hidden;pointer-events:none;}
#boot svg{width:80px;height:80px;animation:bp 1.5s ease-in-out infinite;}
@keyframes bp{0%,100%{filter:drop-shadow(0 0 8px rgba(0,212,255,.3));transform:scale(1);}50%{filter:drop-shadow(0 0 30px rgba(0,212,255,.8));transform:scale(1.06);}}
.bb-w{width:200px;height:2px;background:rgba(0,212,255,.1);border-radius:2px;margin-top:28px;overflow:hidden;}
.bb{height:100%;width:0;background:var(--sh);border-radius:2px;transition:width .3s;box-shadow:0 0 12px rgba(0,212,255,.6);}
.bt{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;color:rgba(0,212,255,.4);margin-top:14px;text-transform:uppercase;}

/* ── BODY ── */
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 100% 50% at 50% -10%,rgba(0,212,255,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 10% 90%,rgba(167,139,250,.04) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 90% 80%,rgba(0,136,170,.03) 0%,transparent 50%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 60% at 50% 25%,rgba(0,0,0,.6) 0%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 25%,rgba(0,0,0,.6) 0%,transparent 100%);}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 75% 65% at 50% 45%,transparent 50%,rgba(3,8,16,.7) 100%);}
#particles{position:fixed;inset:0;pointer-events:none;z-index:1;}
#runes{position:fixed;inset:0;pointer-events:none;z-index:1;}

.app{display:flex;flex-direction:column;height:100vh;max-width:940px;margin:0 auto;position:relative;z-index:2;opacity:0;transition:opacity .6s ease .3s;}
.app.visible{opacity:1;}

/* ── HEADER ── */
.header{padding:22px 24px 14px;text-align:center;flex-shrink:0;}
.sheikah-eye{width:52px;height:52px;margin:0 auto 8px;animation:ef 6s ease-in-out infinite;filter:drop-shadow(0 0 15px rgba(0,212,255,.5));}
@keyframes ef{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 15px rgba(0,212,255,.4));}50%{transform:translateY(-4px);filter:drop-shadow(0 0 25px rgba(0,212,255,.7));}}
.header h1{font-family:'Cinzel',serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--sh) 0%,#66e0ff 50%,var(--sh) 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:ts 4s linear infinite;letter-spacing:6px;text-transform:uppercase;}
@keyframes ts{0%{background-position:0% center;}100%{background-position:200% center;}}
.header .sub{font-size:10px;color:var(--t3);margin-top:5px;letter-spacing:4px;text-transform:uppercase;}
.hd{display:flex;align-items:center;gap:12px;width:280px;margin:14px auto 0;}
.hd .ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),transparent);}
.hd .tri{width:10px;height:10px;position:relative;}.hd .tri::before{content:'';position:absolute;inset:0;clip-path:polygon(50% 0%,0% 100%,100% 100%);background:var(--sh);opacity:.4;}

/* ── CHAT ── */
.chat-area{flex:1;overflow-y:auto;padding:12px 24px;display:flex;flex-direction:column;gap:24px;min-height:0;scroll-behavior:smooth;}
.chat-area::-webkit-scrollbar{width:3px;}.chat-area::-webkit-scrollbar-track{background:transparent;}.chat-area::-webkit-scrollbar-thumb{background:rgba(0,212,255,.15);border-radius:3px;}

/* ── MESSAGES ── */
.msg{max-width:100%;animation:mi .5s cubic-bezier(.16,1,.3,1);}
@keyframes mi{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.msg.user{align-self:flex-end;max-width:72%;}
.msg.user .bubble{background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(0,136,170,.06));border:1px solid rgba(0,212,255,.18);border-radius:20px 20px 4px 20px;padding:14px 22px;font-size:14px;line-height:1.6;backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.2);}
.msg.companion .bubble{font-size:14px;line-height:1.85;color:var(--t2);}
.msg.companion .bubble strong{color:var(--t1);}
.msg.companion .bubble .hl{color:var(--gold);font-weight:600;text-shadow:0 0 18px rgba(245,200,66,.2);}

/* ── CARDS ── */
.cards-row{display:flex;gap:14px;overflow-x:auto;padding:14px 4px 10px;margin-top:14px;}
.cards-row::-webkit-scrollbar{height:3px;}.cards-row::-webkit-scrollbar-thumb{background:rgba(0,212,255,.12);border-radius:2px;}
.item-card{min-width:215px;max-width:255px;background:linear-gradient(168deg,var(--card),#060d1a);border:1px solid var(--border);border-radius:16px;overflow:hidden;flex-shrink:0;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);position:relative;transform-style:preserve-3d;perspective:800px;}
.item-card.legendary-card{border-color:transparent;}.item-card.legendary-card::after{content:'';position:absolute;inset:-1px;border-radius:16px;padding:1px;background:linear-gradient(135deg,var(--gold),rgba(245,200,66,.1),var(--gold),rgba(0,212,255,.3),var(--gold));background-size:300% 300%;animation:lb 4s ease infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;z-index:1;}
@keyframes lb{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.item-card.rare-card{border-color:rgba(167,139,250,.2);}.item-card.uncommon-card{border-color:rgba(0,212,255,.12);}
.item-card:hover{transform:translateY(-6px) scale(1.03) rotateX(2deg);box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 40px rgba(0,212,255,.06);}
.item-card.legendary-card:hover{box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 50px rgba(245,200,66,.1);}
.item-card.rare-card:hover{box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 40px rgba(167,139,250,.08);border-color:rgba(167,139,250,.4);}
.card-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:contain;position:relative;z-index:2;padding:10px;transition:transform .4s cubic-bezier(.16,1,.3,1);filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));}
.item-card:hover .card-img img{transform:scale(1.12) translateY(-3px);}
.card-img::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,var(--card));z-index:1;}
.card-img .bg-glow{position:absolute;width:110px;height:110px;border-radius:50%;filter:blur(45px);opacity:.2;transition:all .5s;}
.item-card:hover .bg-glow{opacity:.5;transform:scale(1.2);}
.card-img.weapon .bg-glow{background:var(--red);}.card-img.armor .bg-glow{background:var(--blue);}.card-img.material .bg-glow{background:var(--zonai);}.card-img.zonai .bg-glow{background:var(--depths);}
.card-img span{position:relative;z-index:2;transition:transform .4s cubic-bezier(.16,1,.3,1);}.item-card:hover .card-img span{transform:scale(1.15) translateY(-3px);}
.card-body{padding:12px 16px 16px;position:relative;z-index:2;}
.card-name{font-weight:600;font-size:13px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#f0f5ff;}
.card-type{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.card-stats{display:flex;gap:10px;align-items:center;}
.card-stat{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t3);}
.card-stat .val{font-weight:700;font-size:16px;font-family:'Cinzel',serif;}
.card-stat.atk .val{color:var(--red);text-shadow:0 0 10px rgba(255,107,107,.3);}
.card-stat.def .val{color:var(--blue);text-shadow:0 0 10px rgba(96,165,250,.3);}
.card-rarity{display:inline-block;padding:3px 9px;border-radius:6px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-left:auto;}
.card-rarity.legendary{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2);}
.card-rarity.rare{background:rgba(167,139,250,.08);color:var(--depths);border:1px solid rgba(167,139,250,.18);}
.card-rarity.uncommon{background:rgba(0,212,255,.06);color:var(--sh);border:1px solid rgba(0,212,255,.12);}
.card-rarity.common{background:rgba(100,116,139,.06);color:var(--t3);border:1px solid rgba(100,116,139,.12);}

/* ── MINIMAP ── */
.minimap-wrap{margin-top:16px;background:linear-gradient(135deg,rgba(5,10,22,.8),rgba(8,14,28,.9));border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden;}
.minimap-wrap::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.2),transparent);}
.minimap-title{font-size:9px;text-transform:uppercase;letter-spacing:2.5px;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.minimap-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.minimap-svg{width:100%;max-width:500px;margin:0 auto;display:block;}

/* ── DETAIL PANEL ── */
.detail-panel{display:none;position:fixed;inset:0;background:rgba(2,4,10,.88);backdrop-filter:blur(16px);z-index:1000;justify-content:center;align-items:center;padding:20px;}
.detail-panel.open{display:flex;}
.detail-content{background:linear-gradient(175deg,#0a1228,#040a18);border:1px solid var(--border);border-radius:22px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;animation:di .45s cubic-bezier(.16,1,.3,1);box-shadow:0 50px 100px rgba(0,0,0,.6),0 0 80px rgba(0,212,255,.04);position:relative;}
.detail-content::-webkit-scrollbar{width:3px;}.detail-content::-webkit-scrollbar-thumb{background:rgba(0,212,255,.12);border-radius:2px;}
@keyframes di{from{opacity:0;transform:translateY(40px) scale(.92);}to{opacity:1;transform:translateY(0) scale(1);}}
.detail-content::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:22px 22px 0 0;z-index:10;}
.detail-content.legendary-detail::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.detail-content.rare-detail::before{background:linear-gradient(90deg,transparent,var(--depths),transparent);}
.detail-content.uncommon-detail::before{background:linear-gradient(90deg,transparent,var(--sh),transparent);}
.detail-content.common-detail::before{background:linear-gradient(90deg,transparent,var(--t3),transparent);}
.detail-hero{padding:32px 30px 24px;display:flex;align-items:center;gap:20px;border-bottom:1px solid var(--border);position:relative;}
.detail-hero::after{content:'';position:absolute;bottom:-1px;left:30px;right:30px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.15),transparent);}
.detail-emoji-wrap{position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.detail-emoji-wrap .glow{position:absolute;inset:-10px;border-radius:50%;filter:blur(20px);opacity:.3;}
.detail-emoji{font-size:48px;position:relative;z-index:1;}
.detail-emoji-wrap img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));}
.detail-info h2{font-family:'Cinzel',serif;font-size:22px;color:var(--sh);text-shadow:0 0 25px rgba(0,212,255,.2);}
.detail-info .detail-sub{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:2.5px;margin-top:5px;}
.detail-close{margin-left:auto;width:42px;height:42px;border-radius:12px;background:rgba(3,8,16,.8);border:1px solid var(--border);color:var(--t3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.detail-close:hover{color:var(--sh);border-color:var(--sh);box-shadow:0 0 20px rgba(0,212,255,.12);}
.detail-stats{display:flex;gap:12px;padding:22px 30px;}
.stat-box{flex:1;background:linear-gradient(140deg,rgba(5,10,22,.9),rgba(8,14,28,.95));border:1px solid var(--border);border-radius:14px;padding:18px 14px;text-align:center;position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;border-radius:0 0 2px 2px;}
.stat-box.atk-box::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}
.stat-box.def-box::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.stat-box.gold-box::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.stat-val{font-family:'Cinzel',serif;font-size:32px;font-weight:700;display:block;}
.stat-val.atk{color:var(--red);text-shadow:0 0 25px rgba(255,107,107,.3);}
.stat-val.def{color:var(--blue);text-shadow:0 0 25px rgba(96,165,250,.3);}
.stat-val.gold{color:var(--gold);text-shadow:0 0 25px rgba(245,200,66,.3);}
.stat-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-top:6px;}
.stat-bar-wrap{width:80%;margin:8px auto 0;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;}
.stat-bar{height:100%;border-radius:2px;width:0;transition:width .8s cubic-bezier(.16,1,.3,1) .3s;}
.stat-bar.atk{background:linear-gradient(90deg,var(--red),#ff9999);}.stat-bar.def{background:linear-gradient(90deg,var(--blue),#99ccff);}
.detail-section{padding:0 30px 24px;}
.detail-section h4{font-size:9px;text-transform:uppercase;letter-spacing:2.5px;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.detail-section h4::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.detail-section p{font-size:14px;line-height:1.85;color:var(--t2);}
.detail-loc{display:flex;align-items:flex-start;gap:14px;background:linear-gradient(135deg,rgba(5,10,22,.7),rgba(8,14,28,.9));border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-top:12px;}
.detail-loc .pin{font-size:24px;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(0,212,255,.3));}.detail-loc .loc-text{font-size:13px;line-height:1.7;color:var(--t1);}
.detail-fuse{background:linear-gradient(135deg,rgba(245,200,66,.05),rgba(245,200,66,.015));border:1px solid rgba(245,200,66,.12);border-radius:14px;padding:18px 20px;margin-top:12px;font-size:13px;line-height:1.7;color:var(--gold);position:relative;overflow:hidden;}
.detail-fuse::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,200,66,.3),transparent);}

/* Detail minimap */
.detail-map-section{padding:0 30px 24px;}

/* ── QUICK ACTIONS ── */
.quick-actions{padding:8px 24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;flex-shrink:0;}
.quick-btn{padding:10px 20px;border-radius:28px;font-size:12px;font-weight:500;background:rgba(7,14,28,.9);border:1px solid var(--border);color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .35s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(8px);position:relative;overflow:hidden;}
.quick-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(0,212,255,.05));opacity:0;transition:opacity .3s;}.quick-btn:hover::before{opacity:1;}
.quick-btn:hover{border-color:var(--sh);color:var(--sh);box-shadow:0 0 25px rgba(0,212,255,.08),inset 0 0 20px rgba(0,212,255,.03);transform:translateY(-2px);}

/* ── INPUT ── */
.input-area{padding:12px 24px 24px;flex-shrink:0;}
.input-row{display:flex;gap:12px;align-items:center;}
.input-field{flex:1;padding:16px 24px;background:rgba(7,14,28,.95);border:1px solid var(--border);border-radius:30px;color:var(--t1);font-size:14px;outline:none;transition:all .35s;backdrop-filter:blur(12px);}
.input-field:focus{border-color:var(--sh);box-shadow:0 0 0 3px rgba(0,212,255,.08),0 0 40px rgba(0,212,255,.05);}
.input-field::placeholder{color:var(--t3);}
.send-btn{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--sh),var(--sh-dim));border:none;color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .35s cubic-bezier(.16,1,.3,1);box-shadow:0 4px 25px rgba(0,212,255,.3);position:relative;overflow:hidden;}
.send-btn::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.2),transparent 60%);}
.send-btn:hover{transform:scale(1.1);box-shadow:0 6px 35px rgba(0,212,255,.4);}.send-btn:active{transform:scale(.95);}

.typing{display:inline-flex;gap:6px;padding:8px 0;}.typing span{width:7px;height:7px;border-radius:50%;background:var(--sh);opacity:.2;animation:tp 1.4s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes tp{0%,60%,100%{opacity:.15;transform:translateY(0) scale(1);}30%{opacity:1;transform:translateY(-5px) scale(1.3);}}
.welcome-glow{display:inline;background:linear-gradient(90deg,var(--gold),var(--sh),var(--gold));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:wg 3s linear infinite;font-weight:700;font-family:'Cinzel',serif;}
@keyframes wg{0%{background-position:0% center;}100%{background-position:200% center;}}

@media(max-width:640px){.app{max-width:100%;}.chat-area{padding:10px 14px;}.input-area{padding:10px 14px 18px;}.item-card{min-width:180px;}.header h1{font-size:18px;letter-spacing:3px;}.detail-hero,.detail-stats,.detail-section,.detail-map-section{padding-left:22px;padding-right:22px;}.minimap-wrap{padding:12px;}}
</style>
</head>
<body>
<div id="boot">
  <svg viewBox="0 0 100 100" fill="none"><ellipse cx="50" cy="50" rx="40" ry="23" stroke="#00d4ff" stroke-width="2" opacity=".7"/><ellipse cx="50" cy="50" rx="28" ry="16" stroke="#00d4ff" stroke-width="1" opacity=".3"/><circle cx="50" cy="50" r="13" stroke="#00d4ff" stroke-width="2" fill="rgba(0,212,255,.08)"/><circle cx="50" cy="50" r="6" fill="#00d4ff" opacity=".9"/><circle cx="50" cy="50" r="2.5" fill="#fff"/><line x1="50" y1="27" x2="50" y2="6" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity=".5"/><line x1="50" y1="73" x2="50" y2="94" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity=".25"/><path d="M37 37 C32 30,22 28,12 32" stroke="#00d4ff" stroke-width="1" opacity=".3" fill="none"/><path d="M63 37 C68 30,78 28,88 32" stroke="#00d4ff" stroke-width="1" opacity=".3" fill="none"/></svg>
  <div class="bb-w"><div class="bb" id="bb"></div></div>
  <div class="bt">Linking to Purah Pad</div>
</div>
<div class="vignette"></div>
<canvas id="particles"></canvas>
<canvas id="runes"></canvas>

<div class="app" id="app">
  <header class="header">
    <svg class="sheikah-eye" viewBox="0 0 100 100" fill="none"><ellipse cx="50" cy="50" rx="38" ry="22" stroke="#00d4ff" stroke-width="2.5" opacity=".8"/><circle cx="50" cy="50" r="12" stroke="#00d4ff" stroke-width="2" fill="rgba(0,212,255,.08)"/><circle cx="50" cy="50" r="5" fill="#00d4ff" opacity=".9"/><circle cx="50" cy="50" r="2" fill="#fff" opacity=".9"/><line x1="50" y1="28" x2="50" y2="8" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity=".5"/><line x1="50" y1="72" x2="50" y2="92" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity=".2"/><path d="M38 38 C33 33,25 30,15 33" stroke="#00d4ff" stroke-width="1" opacity=".35" fill="none"/><path d="M62 38 C67 33,75 30,85 33" stroke="#00d4ff" stroke-width="1" opacity=".35" fill="none"/></svg>

// Simplified Hyrule outline polygon (on 0-100 coordinate system)
const HYRULE_OUTLINE="M10,8 L22,5 L35,7 L48,4 L60,3 L72,5 L82,8 L88,14 L86,24 L90,35 L88,48 L84,58 L78,67 L68,75 L58,78 L48,76 L38,72 L28,75 L18,78 L10,70 L6,58 L5,45 L7,32 L5,20 Z";

function renderMiniMap(items){
  // Collect unique regions from items
  const regionKeys=[...new Set(items.map(i=>i.r).filter(Boolean))];
  if(!regionKeys.length||regionKeys.every(r=>r==='everywhere'))return '';

  const markers=regionKeys.map(k=>REGIONS[k]).filter(Boolean);
  if(!markers.length)return '';

  // Build SVG
  const W=460,H=360;
  const sx=W/100,sy=H/100;

  let svg=`<div class="minimap-wrap"><div class="minimap-title">📍 Location on Hyrule Map</div><svg class="minimap-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Background
  svg+=`<rect width="${W}" height="${H}" fill="rgba(3,8,16,0.6)" rx="8"/>`;

  // Grid lines
  for(let i=0;i<=100;i+=20){
    svg+=`<line x1="${i*sx}" y1="0" x2="${i*sx}" y2="${H}" stroke="rgba(0,212,255,0.04)" stroke-width="0.5"/>`;
    svg+=`<line x1="0" y1="${i*sy}" x2="${W}" y2="${i*sy}" stroke="rgba(0,212,255,0.04)" stroke-width="0.5"/>`;
  }

  // Hyrule outline
  const scaledOutline=HYRULE_OUTLINE.replace(/(\d+\.?\d*),(\d+\.?\d*)/g,(m,x,y)=>`${(x*sx).toFixed(1)},${(y*sy).toFixed(1)}`);
  svg+=`<path d="${scaledOutline}" fill="rgba(0,212,255,0.03)" stroke="rgba(0,212,255,0.12)" stroke-width="1.5" stroke-linejoin="round"/>`;

  // Landmark labels
  LANDMARKS.forEach(l=>{
    svg+=`<text x="${l.x*sx}" y="${l.y*sy}" font-family="Inter,sans-serif" font-size="${l.s}" fill="rgba(148,163,184,0.25)" text-anchor="middle" dominant-baseline="middle">${l.n}</text>`;
  });

  // Marker dots with glow and labels
  markers.forEach((m,i)=>{
    const mx=m.x*sx, my=m.y*sy;
    // Outer glow
    svg+=`<circle cx="${mx}" cy="${my}" r="14" fill="rgba(0,212,255,0.08)">`;
    svg+=`<animate attributeName="r" values="12;18;12" dur="2.5s" repeatCount="indefinite" begin="${i*0.3}s"/></circle>`;
    // Mid glow
    svg+=`<circle cx="${mx}" cy="${my}" r="7" fill="rgba(0,212,255,0.15)">`;
    svg+=`<animate attributeName="opacity" values="0.15;0.3;0.15" dur="2s" repeatCount="indefinite" begin="${i*0.3}s"/></circle>`;
    // Core dot
    svg+=`<circle cx="${mx}" cy="${my}" r="4" fill="#00d4ff" opacity="0.9"/>`;
    svg+=`<circle cx="${mx}" cy="${my}" r="2" fill="#ffffff" opacity="0.8"/>`;
    // Label
    const labelY=my-16;
    svg+=`<text x="${mx}" y="${labelY}" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#00d4ff" text-anchor="middle" opacity="0.9">${m.n}</text>`;
  });

  svg+=`</svg></div>`;
  return svg;
}

function renderDetailMap(item){
  if(!item.r||item.r==='everywhere')return '';
  const m=REGIONS[item.r];
  if(!m)return '';

  const W=460,H=300;
  const sx=W/100,sy=H/100;
  const mx=m.x*sx, my=m.y*sy;

  let svg=`<div class="detail-map-section"><div class="minimap-wrap"><div class="minimap-title">📍 Location</div><svg class="minimap-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect width="${W}" height="${H}" fill="rgba(3,8,16,0.6)" rx="8"/>`;
  for(let i=0;i<=100;i+=20){
    svg+=`<line x1="${i*sx}" y1="0" x2="${i*sx}" y2="${H}" stroke="rgba(0,212,255,0.04)" stroke-width="0.5"/>`;
    svg+=`<line x1="0" y1="${i*sy}" x2="${W}" y2="${i*sy}" stroke="rgba(0,212,255,0.04)" stroke-width="0.5"/>`;
  }
  const so=HYRULE_OUTLINE.replace(/(\d+\.?\d*),(\d+\.?\d*)/g,(m,x,y)=>`${(x*sx).toFixed(1)},${(y*sy).toFixed(1)}`);
  svg+=`<path d="${so}" fill="rgba(0,212,255,0.03)" stroke="rgba(0,212,255,0.12)" stroke-width="1.5" stroke-linejoin="round"/>`;
  LANDMARKS.forEach(l=>{svg+=`<text x="${l.x*sx}" y="${l.y*sy}" font-family="Inter,sans-serif" font-size="6" fill="rgba(148,163,184,0.2)" text-anchor="middle" dominant-baseline="middle">${l.n}</text>`;});
  svg+=`<circle cx="${mx}" cy="${my}" r="16" fill="rgba(0,212,255,0.06)"><animate attributeName="r" values="14;22;14" dur="2.5s" repeatCount="indefinite"/></circle>`;
  svg+=`<circle cx="${mx}" cy="${my}" r="8" fill="rgba(0,212,255,0.15)"><animate attributeName="opacity" values="0.15;0.35;0.15" dur="2s" repeatCount="indefinite"/></circle>`;
  svg+=`<circle cx="${mx}" cy="${my}" r="5" fill="#00d4ff" opacity="0.9"/><circle cx="${mx}" cy="${my}" r="2.5" fill="#ffffff" opacity="0.8"/>`;
  svg+=`<text x="${mx}" y="${my-20}" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#00d4ff" text-anchor="middle" opacity="0.9">${m.n}</text>`;
  svg+=`</svg></div></div>`;
  return svg;
}

const ALL=[...DB.weapons,...DB.armor,...DB.materials,...DB.builds];
function itemType(item){if(DB.weapons.includes(item))return'weapon';if(DB.armor.includes(item))return'armor';if(DB.materials.includes(item))return'material';return'zonai';}

function imgPath(item){return`img/${item.id}.png`;}
function imgTag(item,cls){
  const src=imgPath(item);
  const fb=item.emoji||'📦';
  return`<img src="${src}" alt="${item.name}" onerror="this.outerHTML='<span${cls?' class=&quot;'+cls+'&quot;':''}>${fb}</span>'" loading="lazy">`;
}

function renderCard(item){
  const t=itemType(item);
  const a=item.atk?`<div class="card-stat atk"><span class="val">${item.atk}</span> ATK</div>`:'';
  const d=item.def?`<div class="card-stat def"><span class="val">${item.def}</span> DEF</div>`:'';
  const f=item.fuseDmg?`<div class="card-stat atk"><span class="val">+${item.fuseDmg}</span> FUSE</div>`:'';
  const visual=imgTag(item);
  return`<div class="item-card ${item.rarity}-card" onclick="showDetail('${item.id}')"><div class="card-img ${t}"><div class="bg-glow"></div>${visual}</div><div class="card-body"><div class="card-name">${item.name}</div><div class="card-type">${item.sub}</div><div class="card-stats">${a}${d}${f}<span class="card-rarity ${item.rarity}">${item.rarity}</span></div></div></div>`;
}
function renderCards(items){if(!items.length)return'';return`<div class="cards-row">${items.map(renderCard).join('')}</div>`;}

function showDetail(id){
  const item=ALL.find(i=>i.id===id);if(!item)return;
  const maxA=55,maxD=90;let s='';
  if(item.atk){const p=Math.min(100,Math.round(item.atk/maxA*100));s+=`<div class="stat-box atk-box"><span class="stat-val atk">${item.atk}</span><div class="stat-lbl">Attack</div><div class="stat-bar-wrap"><div class="stat-bar atk" data-w="${p}%"></div></div></div>`;}
  if(item.def){const p=Math.min(100,Math.round(item.def/maxD*100));s+=`<div class="stat-box def-box"><span class="stat-val def">${item.def}</span><div class="stat-lbl">Defense</div><div class="stat-bar-wrap"><div class="stat-bar def" data-w="${p}%"></div></div></div>`;}
  if(item.fuseDmg)s+=`<div class="stat-box atk-box"><span class="stat-val atk">+${item.fuseDmg}</span><div class="stat-lbl">Fuse Bonus</div><div class="stat-bar-wrap"><div class="stat-bar atk" data-w="${Math.min(100,Math.round(item.fuseDmg/55*100))}%"></div></div></div>`;
  if(item.bonus)s+=`<div class="stat-box gold-box"><span class="stat-val gold" style="font-size:13px">${item.bonus}</span><div class="stat-lbl">Set Bonus</div></div>`;
  const gc=item.rarity==='legendary'?'245,200,66':item.rarity==='rare'?'167,139,250':'0,212,255';
  let p=item.pieces?`<div class="detail-section"><h4>Pieces</h4><p>${item.pieces.join(' · ')}</p></div>`:'';
  let fu=item.fuse?`<div class="detail-section"><h4>Best Fusion</h4><div class="detail-fuse">💡 ${item.fuse}</div></div>`:'';
  let co=item.components?`<div class="detail-section"><h4>Components</h4><p>${item.components}</p></div>`:'';
  const dm=renderDetailMap(item);
  const dc=document.getElementById('dc');
  dc.className=`detail-content ${item.rarity}-detail`;
  const detailVisual=imgTag(item,'detail-emoji');
  dc.innerHTML=`<div class="detail-hero"><div class="detail-emoji-wrap"><div class="glow" style="background:rgba(${gc},.3)"></div>${detailVisual}</div><div class="detail-info"><h2>${item.name}</h2><div class="detail-sub">${item.sub}</div></div><button class="detail-close" onclick="closeDetail()">✕</button></div>${s?`<div class="detail-stats">${s}</div>`:''}<div class="detail-section"><h4>Description</h4><p>${item.desc}</p></div><div class="detail-section"><h4>Where to Find</h4><div class="detail-loc"><span class="pin">📍</span><div class="loc-text">${item.loc}</div></div></div>${dm}${fu}${p}${co}`;
  document.getElementById('dp').classList.add('open');
  requestAnimationFrame(()=>{dc.querySelectorAll('.stat-bar[data-w]').forEach(b=>{requestAnimationFrame(()=>{b.style.width=b.dataset.w;});});});
}
function closeDetail(){document.getElementById('dp').classList.remove('open');}
document.getElementById('dp').addEventListener('click',e=>{if(e.target.id==='dp')closeDetail();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

function match(t,kw){return kw.some(k=>t.includes(k));}
function findItems(names){return names.map(n=>ALL.find(i=>i.name.toLowerCase()===n.toLowerCase())).filter(Boolean);}

function findResponse(q){const ql=q.toLowerCase();
if(match(ql,['lynel','beat','fight','kill'])){const c=findItems(['barbarian set','savage lynel bow','master sword','silver lynel saber horn','fierce deity set']);return{text:`Lynels are the toughest enemies in Hyrule. For melee, use <strong>Flurry Rush</strong> — dodge at the last moment. Wear the <span class="hl">Barbarian Set</span> or <span class="hl">Fierce Deity Set</span> for attack boosts, with a weapon fused with a strong horn (+30 or higher). For ranged, headshot to stun, then mount the Lynel and attack from its back — this doesn't consume weapon durability. Bring <span class="hl">Hearty Durian</span> meals for full recovery.`,cards:c};}
if(match(ql,['strongest','best weapon','most powerful','highest damage'])){const c=findItems(["royal guard's claymore",'scimitar of the seven','master sword','gloom club']);return{text:`The <span class="hl">Royal Guard's Claymore</span> fused with a <span class="hl">Silver Lynel Saber Horn</span> reaches 87 attack — and its Breaking Point doubles that to roughly <span class="hl">160 damage per hit</span> when nearly broken. For one-handed, the <span class="hl">Scimitar of the Seven</span> doubles fusion power, reaching 138. The <span class="hl">Gloom Club</span> has highest raw base at 50. And the <span class="hl">Master Sword</span> never breaks, making it the best sustained weapon.`,cards:c};}
if(match(ql,['early game','beginning','start','first'])){const c=findItems(["soldier's broadsword",'hylian set','bomb flower','puffshroom']);return{text:`Grab every <span class="hl">Soldier's Broadsword</span> you find and fuse with Bokoblin Horns. Buy the <span class="hl">Hylian Set</span> at Lookout Landing for 210 rupees total. Collect <span class="hl">Bomb Flowers</span> and <span class="hl">Puffshrooms</span> from caves — they're game-changers. Don't hoard weapons, fuse everything.`,cards:c};}
if(match(ql,['depths','underground','deep','gloom'])){const c=findItems(['depths set','dark set','gloom sword','gloom club','zonaite','ancient blade']);return{text:`Wear the <span class="hl">Depths Set</span> (buy with Poes at Bargainer Statues) for Gloom resistance. Without it, max hearts shrink permanently until surface. Throw Brightbloom Seeds constantly. <span class="hl">Gloom weapons</span> (41-50 attack) are powerful but risky. Farm <span class="hl">Zonaite</span> while underground. Save <span class="hl">Ancient Blades</span> for emergencies — they one-shot any non-boss.`,cards:c};}
if(match(ql,['air bike','fly','vehicle','build'])){const c=findItems(['air bike','flying platform','rocket sled','battle wagon']);return{text:`The <span class="hl">Air Bike</span> is the best vehicle. 2 Fans at 45° + Steering Stick between them. Save to <strong>Autobuild</strong> immediately. The <span class="hl">Flying Platform</span> for slow vertical ascent, <span class="hl">Rocket Sled</span> for insane speed, <span class="hl">Battle Wagon</span> for rolling into camps with beam weapons.`,cards:c};}
if(match(ql,['diamond','gem','rupee','money'])){const c=findItems(['diamond','ruby','sapphire','topaz']);return{text:`<span class="hl">Diamonds</span> drop from Stone Taluses (especially Rare variants), from black ore deposits in caves (Eldin and Gerudo), and Goron City merchant for 1000 rupees. You need them for legendary weapons: 4 for Scimitar, 3 each for Trident and Boulder Breaker. For rupees, sell gems: Diamonds (500), Sapphires (150), Rubies (110).`,cards:c};}
if(match(ql,['armor','best armor','combat armor','defence','defense'])){const c=findItems(['barbarian set','fierce deity set','depths set','glide set',"ancient hero's aspect"]);return{text:`For combat: <span class="hl">Barbarian Set</span> or <span class="hl">Fierce Deity Set</span> — Attack Up + Charge Stamina Up. For Depths: <span class="hl">Depths Set</span> is essential. For Sky Islands: <span class="hl">Glide Set</span> with zero fall damage. Endgame: <span class="hl">Ancient Hero's Aspect</span> from all 152 shrines — highest defense in the game.`,cards:c};}
if(match(ql,['fusion','fuse','attach','combine'])){const c=findItems(['silver lynel saber horn','muddle bud','bomb flower','light dragon horn shard']);return{text:`Strongest fuse material: <span class="hl">Silver Lynel Saber Horn</span> at +55. Tactical: <span class="hl">Muddle Buds</span> make enemies fight each other, <span class="hl">Bomb Flowers</span> create explosive arrows, gems add elements. Some weapons <em>multiply</em> fusion power — Scimitar of the Seven and Gerudo Scimitar both double it.`,cards:c};}
if(match(ql,['cook','food','recipe','heal','hearts','stamina','meal'])){const c=findItems(['hearty durian','endura carrot']);return{text:`<span class="hl">Hearty Durian</span> (Faron region) cooked alone: full recovery + bonus hearts. <span class="hl">Endura Carrot</span> (near Great Fairy Fountains) cooked alone: full stamina recovery + bonus. Cook single high-value ingredients, not mixtures. Cook during Blood Moon for critical success. Five Hearty Durians = full recovery + 20 bonus hearts.`,cards:c};}
if(match(ql,['dragon','dinraal','naydra','farosh','light dragon'])){const c=findItems(['light dragon horn shard','dinraal horn shard','naydra horn shard','farosh horn shard']);return{text:`Four dragons on set paths. <span class="hl">Light Dragon</span> circles all Hyrule at high altitude. <span class="hl">Dinraal</span> (fire) through Eldin/Akkala. <span class="hl">Naydra</span> (ice) through Lanayru. <span class="hl">Farosh</span> (electric) through Faron/Lake Hylia. Land on their back, climb to horn, strike. Each horn gives +20 fuse attack + element, and cooks into 30-minute resistance buff.`,cards:c};}
if(match(ql,['shrine','152','blessing'])){const c=findItems(["ancient hero's aspect"]);return{text:`<span class="hl">152 shrines</span> total: 120 surface, 32 sky. Each gives one Light of Blessing — trade 4 at Goddess Statues for a heart or stamina upgrade. Complete all 152 for the <span class="hl">Ancient Hero's Aspect</span>. Use Shrine Sensor from Hateno Research Lab.`,cards:c};}
if(match(ql,['zonai','device','battery','energy'])){const c=findItems(['zonaite set','air bike','zonaite','large zonaite']);return{text:`Get Zonai Devices from dispensers on Sky Islands and in Depths. <span class="hl">Zonaite Set</span> doubles battery recharge — essential for builders. Farm <span class="hl">Zonaite</span> in the Depths. Key devices: Fans (flight), Wheels (ground), Rockets (speed), Beam Emitters (combat), Springs (launch).`,cards:c};}
if(match(ql,['shield','parry','block','guard'])){const c=findItems(['hylian shield','savage lynel shield','gloom shield','royal shield']);return{text:`The <span class="hl">Hylian Shield</span> is the ultimate shield at 90 defense — find it in Hyrule Castle Lockup. Before that, the <span class="hl">Savage Lynel Shield</span> at 62 is second best. Fuse a <span class="hl">Ruby</span> for fire burst on parry, or a <span class="hl">Puffshroom</span> for smoke screen escape.`,cards:c};}
if(match(ql,['bow','arrow','ranged','shoot'])){const c=findItems(["royal guard's bow",'savage lynel bow','great eagle bow',"demon king's bow","forest dweller's bow"]);return{text:`Best single-shot: <span class="hl">Royal Guard's Bow</span> at 50 damage. Best multi-shot: <span class="hl">Savage Lynel Bow</span> fires 3 arrows for 96 total. <span class="hl">Great Eagle Bow</span> is the fastest triple-shot. <span class="hl">Demon King's Bow</span> scales with hearts up to 50.`,cards:c};}
if(match(ql,['rain','climb','slip','wet'])){const c=findItems(['froggy set','climbing set','zora sword','zora set']);return{text:`The <span class="hl">Froggy Set</span> completely prevents slipping in rain. Get it from the Lucky Clover Gazette questline. The <span class="hl">Climbing Set</span> speeds up all climbing. If you don't have the Froggy Set yet, use Revali's Gale or Ascend through surfaces.`,cards:c};}
if(match(ql,['horse','mount','stable','pony'])){return{text:`Catch horses in Hyrule Field, register at stables (20 rupees). Look for Speed 5, Stamina 5 horses near Taobab Grassland. Feed <span class="hl">Endura Carrots</span> for temporary bonus spurs. The Giant Horse is near Taobab Grassland. Lord of the Mountain at Satori Mountain can't be registered. Pony Points earn gear at stables.`,cards:findItems(['endura carrot'])};}
if(match(ql,['blood moon','reset','respawn'])){return{text:`Blood Moons occur every ~2 hours 48 minutes of real play time, resetting all enemies and weapons. Cook during Blood Moon (11:30 PM in-game) for guaranteed critical success. All overworld weapons respawn. Stone Taluses, Hinoxes, and Lynels all reset.`,cards:[]};}
const nm=ALL.filter(i=>i.name.toLowerCase().includes(ql)||ql.includes(i.name.toLowerCase()));
if(nm.length>0){const item=nm[0];let t=`<span class="hl">${item.name}</span> — ${item.desc}`;if(item.fuse)t+=`<br><br><strong>Best Fusion:</strong> ${item.fuse}`;if(item.components)t+=`<br><br><strong>Components:</strong> ${item.components}`;if(item.bonus)t+=`<br><br><strong>Set Bonus:</strong> ${item.bonus}`;if(item.pieces)t+=`<br><br><strong>Pieces:</strong> ${item.pieces.join(' · ')}`;return{text:t,cards:nm.slice(0,5)};}
const rs=ALL.filter(i=>{const h=`${i.name} ${i.sub} ${i.desc} ${i.loc||''} ${i.bonus||''} ${i.fuse||''}`.toLowerCase();return ql.split(/\s+/).some(w=>w.length>2&&h.includes(w));});
if(rs.length>0)return{text:`Here's what I found:`,cards:rs.slice(0,6)};
return{text:`I don't have that yet — the knowledge base is growing. Try asking about weapons, armor, materials, builds, cooking, dragons, shrines, shields, bows, or combat tips.`,cards:[]};}

const chat=document.getElementById('chat');
function addMsg(html,isUser=false){const d=document.createElement('div');d.className=`msg ${isUser?'user':'companion'}`;d.innerHTML=`<div class="bubble">${html}</div>`;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d;}
function addCompanionMsg(text,cards=[]){
  const map=renderMiniMap(cards);
  const d=document.createElement('div');d.className='msg companion';
  d.innerHTML=`<div class="bubble">${text}${renderCards(cards)}${map}</div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function send(text){if(!text.trim())return;addMsg(text,true);document.getElementById('input').value='';const t=addMsg('<div class="typing"><span></span><span></span><span></span></div>');t.id='typing';setTimeout(()=>{document.getElementById('typing')?.remove();const r=findResponse(text);addCompanionMsg(r.text,r.cards);},600+Math.random()*600);}

document.getElementById('send').addEventListener('click',()=>send(document.getElementById('input').value));
document.getElementById('input').addEventListener('keypress',e=>{if(e.key==='Enter')send(e.target.value);});
document.getElementById('qa').addEventListener('click',e=>{if(e.target.classList.contains('quick-btn'))send(e.target.dataset.q);});
addCompanionMsg(`Welcome to <span class="welcome-glow">Forest Dweller's Project</span>. I know everything about Tears of the Kingdom — every weapon, every armor set, every material, every build. Ask me anything, or tap a button below.`,[]);
</script>
