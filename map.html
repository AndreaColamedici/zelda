<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyrule Map — TotK Companion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --sh:#00d4ff;--sh-dim:#0088aa;--sh-gl:rgba(0,212,255,0.25);
  --zonai:#7cfc00;--depths:#a78bfa;--gold:#f5c842;
  --red:#ff6b6b;--blue:#60a5fa;
  --bg:#030810;--panel:#070e1c;--card:#0b1528;--border:#142040;
  --t1:#e8ecf4;--t2:#94a3b8;--t3:#4a6080;
}
*{margin:0;padding:0;box-sizing:border-box;}

/* ── BOOT ── */
#boot{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s;}
#boot.done{opacity:0;visibility:hidden;pointer-events:none;}
#boot svg{width:80px;height:80px;animation:bp 1.5s ease-in-out infinite;}
@keyframes bp{0%,100%{filter:drop-shadow(0 0 8px rgba(0,212,255,.3));transform:scale(1);}50%{filter:drop-shadow(0 0 30px rgba(0,212,255,.8));transform:scale(1.06);}}
.bb-w{width:200px;height:2px;background:rgba(0,212,255,.1);border-radius:2px;margin-top:28px;overflow:hidden;}
.bb{height:100%;width:0;background:var(--sh);border-radius:2px;transition:width .3s;box-shadow:0 0 12px rgba(0,212,255,.6);}
.bt{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;color:rgba(0,212,255,.4);margin-top:14px;text-transform:uppercase;}

/* ── BODY ── */
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 100% 50% at 50% -10%,rgba(0,212,255,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 10% 90%,rgba(167,139,250,.04) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 90% 80%,rgba(0,136,170,.03) 0%,transparent 50%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 60% at 50% 25%,rgba(0,0,0,.6) 0%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 25%,rgba(0,0,0,.6) 0%,transparent 100%);}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse 75% 65% at 50% 45%,transparent 50%,rgba(3,8,16,.7) 100%);}
#particles{position:fixed;inset:0;pointer-events:none;z-index:1;}
#runes{position:fixed;inset:0;pointer-events:none;z-index:1;}

.app{display:flex;flex-direction:column;height:100vh;max-width:940px;margin:0 auto;position:relative;z-index:2;opacity:0;transition:opacity .6s ease .3s;}
.app.visible{opacity:1;}

/* ── HEADER ── */
.header{padding:22px 24px 14px;text-align:center;flex-shrink:0;}
.sheikah-eye{width:52px;height:52px;margin:0 auto 8px;animation:ef 6s ease-in-out infinite;filter:drop-shadow(0 0 15px rgba(0,212,255,.5));}
@keyframes ef{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 15px rgba(0,212,255,.4));}50%{transform:translateY(-4px);filter:drop-shadow(0 0 25px rgba(0,212,255,.7));}}
.header h1{font-family:'Cinzel',serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,var(--sh) 0%,#66e0ff 50%,var(--sh) 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:ts 4s linear infinite;letter-spacing:6px;text-transform:uppercase;}
@keyframes ts{0%{background-position:0% center;}100%{background-position:200% center;}}
.header .sub{font-size:10px;color:var(--t3);margin-top:5px;letter-spacing:4px;text-transform:uppercase;}
.hd{display:flex;align-items:center;gap:12px;width:280px;margin:14px auto 0;}
.hd .ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),transparent);}
.hd .tri{width:10px;height:10px;position:relative;}.hd .tri::before{content:'';position:absolute;inset:0;clip-path:polygon(50% 0%,0% 100%,100% 100%);background:var(--sh);opacity:.4;}
.nav-links{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.nav-link{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);text-decoration:none;padding:5px 16px;border:1px solid var(--border);border-radius:20px;transition:all .35s cubic-bezier(.16,1,.3,1);}.nav-link:hover{color:var(--sh);border-color:var(--sh);box-shadow:0 0 20px rgba(0,212,255,.1);transform:translateY(-1px);}

/* ── MAIN ── */
.map-container{flex:1;display:flex;gap:24px;padding:0 24px 24px;overflow:hidden;min-height:0;}
.map-section{flex:1;display:flex;flex-direction:column;min-width:0;}

/* ── MAP ── */
.map-wrap{background:linear-gradient(135deg,rgba(5,10,22,.8),rgba(8,14,28,.9));border:1px solid var(--border);border-radius:16px;padding:16px;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.map-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,transparent 0%,rgba(0,212,255,.03) 100%);pointer-events:none;}
svg.map-svg{max-width:100%;max-height:100%;cursor:pointer;filter:drop-shadow(0 20px 40px rgba(0,0,0,.5));}

/* ── REGIONS ── */
.region{fill:rgba(0,212,255,.08);stroke:var(--sh);stroke-width:2;transition:all .3s cubic-bezier(.16,1,.3,1);cursor:pointer;filter:drop-shadow(0 0 0 rgba(0,212,255,0));}
.region:hover{fill:rgba(0,212,255,.15);filter:drop-shadow(0 0 15px rgba(0,212,255,.4));stroke-width:2.5;}
.region.active{fill:rgba(0,212,255,.25);filter:drop-shadow(0 0 25px rgba(0,212,255,.6));stroke-width:3;}

/* ── PANEL ── */
.panel{width:280px;background:linear-gradient(135deg,var(--panel),#060d1a);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;overflow:hidden;transition:all .3s cubic-bezier(.16,1,.3,1);max-height:100%;}
.panel.hidden{opacity:0;pointer-events:none;transform:translateX(20px);}

.panel-header{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.panel-title{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--sh);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.panel-count{font-size:11px;color:var(--t3);letter-spacing:1px;}

.panel-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-track{background:transparent;}
.panel-body::-webkit-scrollbar-thumb{background:rgba(0,212,255,.15);border-radius:2px;}
.panel-body::-webkit-scrollbar-thumb:hover{background:rgba(0,212,255,.25);}

.item-group{background:rgba(11,21,40,.5);border:1px solid rgba(0,212,255,.1);border-radius:12px;padding:12px;transition:all .3s;}
.item-group:hover{background:rgba(11,21,40,.7);border-color:rgba(0,212,255,.2);}

.group-type{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.group-type::before{content:'';width:3px;height:3px;background:var(--gold);border-radius:50%;opacity:.6;}

.items-list{display:flex;flex-direction:column;gap:6px;font-size:12px;}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:rgba(0,0,0,.2);border-radius:6px;transition:all .25s;cursor:pointer;}
.item-row:hover{background:rgba(0,212,255,.1);transform:translateX(4px);}
.item-name{color:var(--t2);font-weight:500;}
.item-count{color:var(--t3);font-size:10px;background:rgba(0,212,255,.1);padding:2px 6px;border-radius:4px;min-width:24px;text-align:center;}

.panel-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px;text-align:center;padding:20px;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal{background:linear-gradient(135deg,var(--panel),#060d1a);border:1px solid var(--border);border-radius:16px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(0,212,255,.1);border:1px solid var(--border);color:var(--sh);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{background:rgba(0,212,255,.2);border-color:var(--sh);}

.modal-hero{display:flex;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.modal-emoji{font-size:80px;width:100px;height:100px;display:flex;align-items:center;justify-content:center;background:rgba(0,212,255,.06);border-radius:12px;flex-shrink:0;}
.modal-emoji img{width:100%;height:100%;object-fit:contain;padding:8px;}
.modal-info h2{font-family:'Cinzel',serif;font-size:20px;color:var(--t1);margin-bottom:4px;}
.modal-info .msub{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;}

.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.mstat{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.1);border-radius:8px;padding:12px;text-align:center;transition:all .2s;}
.mstat.atk{border-color:rgba(255,107,107,.2);background:rgba(255,107,107,.04);}
.mstat.def{border-color:rgba(96,165,250,.2);background:rgba(96,165,250,.04);}
.mstat.gold{border-color:rgba(245,200,66,.2);background:rgba(245,200,66,.04);}
.mv{font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:var(--t1);margin-bottom:4px;}
.mstat.atk .mv{color:var(--red);}
.mstat.def .mv{color:var(--blue);}
.mstat.gold .mv{color:var(--gold);}
.ml{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}

.modal-section{margin-bottom:16px;}
.modal-section h4{font-family:'Cinzel',serif;font-size:13px;color:var(--sh);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.modal-section p{font-size:13px;color:var(--t2);line-height:1.6;}

.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:rgba(0,212,255,.15);border-radius:2px;}

/* ── RESPONSIVE ── */
@media(max-width:1200px){
  .map-container{flex-direction:column;gap:16px;}
  .panel{width:100%;max-height:280px;}
}

@media(max-width:768px){
  .header{padding:16px 16px 10px;}
  .header h1{font-size:20px;letter-spacing:4px;}
  .map-container{padding:0 16px 16px;}
  .panel{width:100%;}
  svg.map-svg{width:100%;}
}
</style>
</head>
<body>

<div id="boot">
  <svg viewBox="0 0 64 64" fill="none"><path d="M32 8c13.3 0 24 10.7 24 24s-10.7 24-24 24S8 45.3 8 32 18.7 8 32 8m0-4C14.3 4 4 14.3 4 32s10.3 28 28 28 28-10.3 28-28S49.7 4 32 4z" fill="rgba(0,212,255,.6)"/><circle cx="32" cy="16" r="3" fill="var(--sh)"/></svg>
  <div class="bb-w"><div class="bb"></div></div>
  <div class="bt">initializing slate</div>
</div>

<div class="vignette"></div>
<div id="particles"></div>
<div id="runes"></div>

<div class="app">
  <div class="header">
    <svg class="sheikah-eye" viewBox="0 0 64 64" fill="none">
      <path d="M32 8C18.7 8 8 18.7 8 32c0 5.3 1.7 10.2 4.6 14.3L32 48l19.4-1.7c2.9-4.1 4.6-9 4.6-14.3 0-13.3-10.7-24-24-24z" fill="rgba(0,212,255,.3)" stroke="var(--sh)" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="8" fill="var(--sh)"/>
      <circle cx="32" cy="32" r="4" fill="var(--bg)"/>
    </svg>
    <h1>Hyrule Map</h1>
    <div class="sub">Tap a region to explore</div>
    <div class="hd"><div class="ln"></div><div class="tri"></div><div class="ln"></div></div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Companion</a>
      <a href="browse.html" class="nav-link">Browse</a>
      <a href="tracker.html" class="nav-link">Tracker</a>
    </div>
  </div>

  <div class="map-container">
    <div class="map-section">
      <div class="map-wrap">
        <svg class="map-svg" viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg">
          <!-- Central Hyrule -->
          <path class="region" data-region="central" d="M250 200 L350 150 L400 180 L420 260 L380 310 L300 320 L240 280 Z" stroke="var(--sh)" stroke-width="2"/>

          <path class="region" data-region="hyrule-ridge" d="M350 150 L450 120 L500 160 L480 220 L420 260 L400 180 Z" stroke="var(--sh)" stroke-width="2"/>

          <path class="region" data-region="hebra" d="M280 80 L380 40 L420 80 L380 150 L350 120 Z" stroke="var(--sh)" stroke-width="2"/>

          <path class="region" data-region="lanayru" d="M500 340 L580 320 L650 300 L680 360 L600 420 L520 400 Z" stroke="var(--sh)" stroke-width="2"/>

          <path class="region" data-region="necluda" d="M450 300 L520 300 L520 400 L420 420 L380 360 Z" stroke="var(--sh)" stroke-width="2"/>

          <path class="region" data-region="faron" d="M350 400 L420 420 L480 480 L400 540 L320 520 L300 460 Z" stroke="var(--sh)" stroke-width="2"/>

          <path class="region" data-region="sky" d="M400 60 L480 40 L520 80 L500 120 L430 110 Z" stroke="var(--zonai)" stroke-width="2" fill="rgba(124,252,0,.08)"/>

    <div class="panel hidden" id="panel">
      <div class="panel-header">
        <div class="panel-title" id="panel-region">Select Region</div>

</div>

<div class="modal-bg" id="modal-bg">

</div>

<script>
// Region display names and aliases
const REGION_MAP = {
  'central': 'Central Hyrule',
  'hyrule-ridge': 'Hyrule Ridge',
  'tabantha': 'Tabantha',
  'hebra': 'Hebra Mountains',
  'korok': 'Great Hyrule Forest',
  'eldin': 'Eldin',
  'akkala': 'Akkala',
  'lanayru': 'Lanayru',
  'necluda': 'Necluda',
  'faron': 'Faron',
  'gerudo': 'Gerudo Desert',
  'gerudo-high': 'Gerudo Highlands',
  'sky': 'Sky Islands',
  'depths': 'The Depths'
};

const REGION_ALIASES = {
  'light-dragon': 'sky',
  'hyrule-castle': 'central',
  'zora': 'lanayru',
  'goron': 'eldin',
  'rito': 'tabantha',
  'lurelin': 'necluda',
  'kakariko': 'necluda',
  'everywhere': null
};

// Build all items list
function getAllItems() {
  return [
    ...(DB.weapons || []),
    ...(DB.armor || []),
    ...(DB.materials || []),
    ...(DB.builds || []),
    ...(DB.shrines || []),
    ...(DB.recipes || [])
  ];
}

// Normalize region code
function normalizeRegion(r) {
  if (!r) return null;
  if (REGION_ALIASES[r]) return REGION_ALIASES[r];
  if (REGION_MAP[r]) return r;
  return null;
}

// Get item type
function getItemType(item) {
  if (DB.weapons && DB.weapons.includes(item)) return 'weapon';
  if (DB.armor && DB.armor.includes(item)) return 'armor';
  if (DB.materials && DB.materials.includes(item)) return 'material';
  if (DB.shrines && DB.shrines.includes(item)) return 'shrine';
  if (DB.recipes && DB.recipes.includes(item)) return 'recipe';
  return 'build';
}

// Get type display name
function getTypeDisplay(type) {
  const names = {
    'weapon': 'Weapons',
    'armor': 'Armor',
    'material': 'Materials',
    'shrine': 'Shrines',
    'recipe': 'Recipes',
    'build': 'Builds'
  };
  return names[type] || 'Items';
}

// Get items for region
function getRegionItems(regionCode) {
  if (!regionCode) return [];
  const allItems = getAllItems();
  return allItems.filter(item => normalizeRegion(item.r) === regionCode);
}

// Group items by type
function groupItems(items) {
  const grouped = {};
  items.forEach(item => {
    const type = getItemType(item);
    if (!grouped[type]) grouped[type] = [];
    grouped[type].push(item);
  });
  return grouped;
}

// Format item image tag
function imgTag(item) {
  const src = 'img/' + item.id + '.png';
  const fb = item.emoji || '📦';
  return '<img src="' + src + '" alt="' + item.name + '" onerror="this.outerHTML=\'<span>' + fb + '</span>\'" style="width:20px;height:20px;object-fit:contain;">';
}

// Show region details
function showRegion(regionCode) {
  const panel = document.getElementById('panel');
  const titleEl = document.getElementById('panel-region');
  const infoEl = document.getElementById('panel-info');
  const bodyEl = document.getElementById('panel-items');

  // Update active state on SVG
  document.querySelectorAll('.region').forEach(r => r.classList.remove('active'));
  document.querySelector('[data-region="' + regionCode + '"]').classList.add('active');

  // Get items
  const items = getRegionItems(regionCode);
  const grouped = groupItems(items);

  // Update header
  titleEl.textContent = REGION_MAP[regionCode] || regionCode;
  infoEl.textContent = items.length + ' items';

  // Build content
  if (items.length === 0) {
    bodyEl.innerHTML = '<div class="panel-empty">No items in this region.</div>';
  } else {
    let html = '';
    Object.keys(grouped).sort().forEach(type => {
      const typeItems = grouped[type];
      html += '<div class="item-group">';
      html += '<div class="group-type">' + getTypeDisplay(type) + '</div>';
      html += '<div class="items-list">';
      typeItems.sort((a, b) => a.name.localeCompare(b.name)).forEach(item => {
        html += '<div class="item-row" onclick="showDetail(\'' + item.id + '\')">';
        html += '<span class="item-name">' + item.name + '</span>';
        html += '<span class="item-count">1</span>';
        html += '</div>';
      });
      html += '</div></div>';
    });
    bodyEl.innerHTML = html;
  }

  // Show panel with animation
  panel.classList.remove('hidden');
}

// Show item detail modal
function showDetail(itemId) {
  const allItems = getAllItems();
  const item = allItems.find(i => i.id === itemId);
  if (!item) return;

  const type = getItemType(item);
  const modalEl = document.getElementById('modal');

  // Build stats
  let stats = '';
  if (item.atk) stats += '<div class="mstat atk"><div class="mv">' + item.atk + '</div><div class="ml">Attack</div></div>';
  if (item.def) stats += '<div class="mstat def"><div class="mv">' + item.def + '</div><div class="ml">Defense</div></div>';
  if (item.fuseDmg) stats += '<div class="mstat"><div class="mv">+' + item.fuseDmg + '</div><div class="ml">Fuse Bonus</div></div>';
  if (item.bonus) stats += '<div class="mstat gold"><div class="mv">' + item.bonus + '</div><div class="ml">Set Bonus</div></div>';
  if (item.challenge) stats += '<div class="mstat gold"><div class="mv">' + item.challenge + '</div><div class="ml">Challenge</div></div>';
  if (item.effect) stats += '<div class="mstat gold"><div class="mv">' + item.effect + '</div><div class="ml">Effect</div></div>';
  if (item.hearts && item.hearts > 0) stats += '<div class="mstat def"><div class="mv">' + item.hearts + '</div><div class="ml">Hearts</div></div>';

  // Build sections
  let sections = '';
  if (item.desc) sections += '<div class="modal-section"><h4>Description</h4><p>' + item.desc + '</p></div>';
  if (item.loc) sections += '<div class="modal-section"><h4>Location</h4><p>📍 ' + item.loc + '</p></div>';
  if (item.fuse) sections += '<div class="modal-section"><h4>Best Fusion</h4><p>💡 ' + item.fuse + '</p></div>';
  if (item.pieces) sections += '<div class="modal-section"><h4>Pieces</h4><p>' + item.pieces.join(' · ') + '</p></div>';
  if (item.components) sections += '<div class="modal-section"><h4>Components</h4><p>' + item.components + '</p></div>';
  if (item.ingredients) sections += '<div class="modal-section"><h4>Ingredients</h4><p>🍳 ' + item.ingredients.join(' + ') + '</p></div>';

  modalEl.innerHTML = '<button class="modal-close" onclick="closeModal()">✕</button>' +
    '<div class="modal-hero">' +
    '<div class="modal-emoji">' + imgTag(item) + '</div>' +
    '<div class="modal-info"><h2>' + item.name + '</h2><div class="msub">' + item.sub + '</div></div>' +
    '</div>' +
    (stats ? '<div class="modal-stats">' + stats + '</div>' : '') +
    sections;

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

// Region click handler
document.querySelectorAll('.region').forEach(region => {
  region.addEventListener('click', () => {
    const regionCode = region.dataset.region;
    showRegion(regionCode);
  });
});

// Modal close handlers
document.getElementById('modal-bg').addEventListener('click', (e) => {
  if (e.target.id === 'modal-bg') closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Show loading complete
setTimeout(() => {
  document.getElementById('boot').classList.add('done');
  document.querySelector('.app').classList.add('visible');
}, 1200);
</script>

</body>
</html>
